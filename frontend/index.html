<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="titlebar" data-tauri-drag-region>
    <div class="titlebar-brand">
      <img src="JARVIS.jpg" alt="" class="titlebar-logo" />
      <span class="titlebar-title">JARVIS</span>
    </div>
    <div class="titlebar-controls">
      <button type="button" class="titlebar-btn" id="titlebar-minimize" aria-label="Minimize">−</button>
      <button type="button" class="titlebar-btn" id="titlebar-maximize" aria-label="Maximize">□</button>
      <button type="button" class="titlebar-btn titlebar-close" id="titlebar-close" aria-label="Close">×</button>
    </div>
  </header>
  <div class="app-body">
    <aside class="sidebar">
      <div class="sidebar-tabs" role="tablist">
        <button type="button" class="sidebar-tab active" role="tab" id="tab-chats" aria-selected="true" aria-controls="panel-chats">Chats</button>
        <button type="button" class="sidebar-tab" role="tab" id="tab-activity" aria-selected="false" aria-controls="panel-activity">Activity</button>
        <button type="button" class="sidebar-tab" role="tab" id="tab-settings" aria-selected="false" aria-controls="panel-settings">Settings</button>
      </div>
      <div class="sidebar-panel active" id="panel-chats" role="tabpanel" aria-labelledby="tab-chats">
        <div class="sidebar-list chat-history-list" id="chat-history-list">
          <!-- Populated by JS from list_chats -->
        </div>
      </div>
      <div class="sidebar-panel" id="panel-activity" role="tabpanel" aria-labelledby="tab-activity" hidden>
        <div class="sidebar-list activity-list" id="activity-list">
          <p class="activity-empty" id="activity-empty">No actions yet. Actions the chatbot takes will appear here.</p>
          <!-- Activity items can be appended here later -->
        </div>
      </div>
      <div class="sidebar-panel" id="panel-settings" role="tabpanel" aria-labelledby="tab-settings" hidden>
        <div class="sidebar-list settings-panel" id="settings-panel">
          <div class="settings-section">
            <label class="settings-label" for="settings-storage-path">Storage location</label>
            <p class="settings-description">Where chat logs are saved.</p>
            <div class="settings-storage-row">
              <input type="text" id="settings-storage-path" class="settings-storage-input" readonly aria-label="Chats storage path" />
              <button type="button" id="settings-storage-change" class="settings-storage-btn">Change</button>
            </div>
          </div>
        </div>
      </div>
    </aside>
    <div class="chat-container">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <div class="chat-attachments" id="chat-attachments" hidden></div>
      <div class="chat-input-row">
        <button type="button" id="chat-attach" class="chat-attach-btn" aria-label="Attach files">📎</button>
        <textarea id="chat-input" placeholder="Message JARVIS..." rows="1"></textarea>
        <button type="button" id="chat-send" aria-label="Send">Send</button>
      </div>
    </div>
    </div>
  </div>
  <script src="chatbot.js"></script>
</body>
</html>
